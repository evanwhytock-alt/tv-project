<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Loopbox</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #picker {
      width: 100%;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background: #080808;
    }

    .picker-card {
      display: grid;
      justify-items: center;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 10vw, 64px);
      letter-spacing: -0.05em;
    }

    p {
      margin: 0 0 10px;
      color: #aaa;
      font-size: 16px;
    }

    .choose-button {
      min-width: 190px;
      padding: 16px 24px;
      border: 0;
      border-radius: 16px;
      background: #fff;
      color: #000;
      font: inherit;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }

    .choose-button:active {
      transform: scale(0.97);
    }

    #fileInput {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    #player {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      display: none;
      background: #000;
      object-fit: contain;
    }

    #player.active {
      display: block;
    }
  </style>
</head>
<body>
  <main id="picker">
    <div class="picker-card">
      <h1>Loopbox</h1>
      <p>Choose a video. It will loop fullscreen.</p>
      <label class="choose-button" for="fileInput">Choose video</label>
      <input id="fileInput" type="file" accept="video/*">
    </div>
  </main>

  <video id="player" loop playsinline></video>

  <script>
    const fileInput = document.getElementById("fileInput");
    const picker = document.getElementById("picker");
    const player = document.getElementById("player");
    let videoUrl = "";

    async function enterFullscreen() {
      try {
        if (player.requestFullscreen) {
          await player.requestFullscreen();
        } else if (player.webkitEnterFullscreen) {
          player.webkitEnterFullscreen();
        }
      } catch (_) {
        // The video still fills the browser when native fullscreen is blocked.
      }
    }

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;

      if (videoUrl) URL.revokeObjectURL(videoUrl);
      videoUrl = URL.createObjectURL(file);

      picker.hidden = true;
      player.classList.add("active");
      player.src = videoUrl;
      player.currentTime = 0;

      try {
        await player.play();
      } catch (_) {
        // A tap on the video will start it if the browser blocks playback.
      }

      await enterFullscreen();
    });

    player.addEventListener("click", async () => {
      if (player.paused) {
        try {
          await player.play();
        } catch (_) {}
      }
      await enterFullscreen();
    });

    window.addEventListener("beforeunload", () => {
      if (videoUrl) URL.revokeObjectURL(videoUrl);
    });
  </script>
</body>
</html>
